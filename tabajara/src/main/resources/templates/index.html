<!doctype html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabajara | Inicio</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
    <script th:src="@{/js/app.js}" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="brand">
          <div class="brand__icon">T</div>
          <div class="brand__text">
            <strong>Organizacoes Tabajara</strong>
            <span>Bem-vindo</span>
          </div>
        </div>
      </header>

      <main class="app-main">
        <section class="hero">
          <h1>Controle completo, sem complicacao</h1>
          <p>
            Inicie sua jornada pelos produtos e fornecedores da Tabajara. Acesse o sistema para
            criar, editar e visualizar os dados do dia a dia.
          </p>

          <div class="hero-actions">
            <a class="btn btn--primary" th:href="@{/login}">Acessar o sistema</a>
            <a class="btn btn--primary" th:href="@{/usuarios/criar}">Registrar novo usuario</a>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
