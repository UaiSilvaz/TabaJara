<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Usuário</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
    <script th:src="@{/js/app.js}" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="brand">
          <div class="brand__icon">T</div>
          <div class="brand__text">
            <strong>Organizações Tabajara</strong>
            <span>Usuários &amp; acesso</span>
          </div>
        </div>
        <nav class="app-nav" aria-label="Navegação principal">
          <a class="app-nav__link" th:href="@{/home}">Início</a>
          <a class="app-nav__link" th:href="@{/produtos/listar}">Produtos</a>
          <a class="app-nav__link" th:href="@{/fornecedor/listarFornecedores}">Fornecedores</a>
          <a class="app-nav__link" th:href="@{/login}">Login</a>
        </nav>
        <button
          class="theme-toggle"
          id="theme-toggle"
          type="button"
          aria-label="Alternar tema entre claro e escuro"
        ></button>
      </header>

      <main class="app-main">
        <section class="panel">
          <div class="panel__header">
            <div>
              <h2>Cadastro de usuário</h2>
              <p class="table-caption">
                Defina o acesso com login, e-mail e senha do colaborador que vai utilizar o
                sistema.
              </p>
            </div>
            <a class="btn btn--secondary" th:href="@{/login}">Voltar ao login</a>
          </div>

          <form th:action="@{/usuarios/salvar}" th:object="${usuario}" method="POST">
            <input type="hidden" th:field="*{idUsuario}" />

            <div class="form-grid">
              <div class="field-group">
                <label for="nomeUsuario">Nome completo</label>
                <input id="nomeUsuario" type="text" th:field="*{nomeUsuario}" required />
              </div>

              <div class="field-group">
                <label for="emailUsuario">E-mail corporativo</label>
                <input id="emailUsuario" type="email" th:field="*{emailUsuario}" required />
              </div>

              <div class="field-group">
                <label for="loginUsuario">Login</label>
                <input id="loginUsuario" type="text" th:field="*{loginUsuario}" required />
              </div>

              <div class="field-group">
                <label for="senhaUsuario">Senha</label>
                <input id="senhaUsuario" type="password" th:field="*{senhaUsuario}" required />
              </div>
            </div>

            <div class="form-actions">
              <button class="btn btn--primary" type="submit">Salvar usuário</button>
              <a class="btn btn--secondary" th:href="@{/login}">Cancelar</a>
            </div>
          </form>
        </section>
      </main>
    </div>
  </body>
</html>
