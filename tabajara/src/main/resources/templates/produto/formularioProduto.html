<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabajara | Produto</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" th:href="@{/css/app.css(v=20260414)}" />
    <script th:src="@{/js/app.js(v=20260414)}" defer></script>
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div class="site-nav">
          <a class="brand" th:href="@{/home}">
            <span class="brand__icon"><i class="fa-solid fa-bolt"></i></span>
            <span>Tabajara</span>
          </a>

          <button class="nav-toggle" type="button" data-nav-toggle aria-controls="primary-nav" aria-expanded="false" aria-label="Abrir menu">
            <i class="fa-solid fa-bars"></i>
          </button>

          <nav class="nav-links" id="primary-nav" data-nav-links aria-label="Navegacao principal">
            <a class="nav-link" th:href="@{/home}">Home</a>
            <a class="nav-link" th:href="@{/produtos/listar}" aria-current="page">Produtos</a>
            <a class="nav-link" th:href="@{/fornecedor/listarFornecedores}">Fornecedores</a>
          </nav>

          <div class="nav-actions">
            <form th:action="@{/logout}" method="post">
              <button class="btn btn-secondary" type="submit"><i class="fa-solid fa-arrow-right-from-bracket"></i> Sair</button>
            </form>
          </div>
        </div>
      </header>

      <main class="main-wrap">
        <section class="page-card">
          <h1 class="page-title" th:text="${produto.idProduto == null ? 'Novo produto' : 'Editar produto'}">Produto</h1>
          <p class="page-subtitle">Preencha os campos para cadastrar ou atualizar um item no catalogo.</p>

          <form th:action="@{/produtos/salvar}" th:object="${produto}" method="post" class="js-validate" data-loading-text="Salvando produto..." novalidate>
            <input type="hidden" th:field="*{idProduto}" />

            <div class="form-grid">
              <div class="field">
                <label for="descProduto">Descricao</label>
                <input id="descProduto" type="text" th:field="*{descProduto}" required minlength="2" aria-label="Descricao do produto" />
              </div>

              <div class="field">
                <label for="valorProduto">Valor</label>
                <input id="valorProduto" type="number" step="0.01" min="0" th:field="*{valorProduto}" required aria-label="Valor do produto" />
              </div>

              <div class="field">
                <label for="unidadeProduto">Unidade</label>
                <input id="unidadeProduto" type="text" th:field="*{unidadeProduto}" required minlength="1" aria-label="Unidade" />
              </div>

              <div class="field">
                <label for="marcaProduto">Marca</label>
                <input id="marcaProduto" type="text" th:field="*{marcaProduto}" required minlength="2" aria-label="Marca" />
              </div>

              <div class="field field--full">
                <label for="fornecedor">Fornecedor</label>
                <select id="fornecedor" name="idFornecedor" required aria-label="Fornecedor do produto">
                  <option value="" disabled th:selected="${idFornecedor == null}">Selecione um fornecedor</option>
                  <option
                    th:each="fornecedor : ${fornecedores}"
                    th:value="${fornecedor.idFornecedor}"
                    th:text="${fornecedor.nomeFornecedor}"
                    th:selected="${idFornecedor == fornecedor.idFornecedor}"
                  ></option>
                </select>
              </div>
            </div>

            <div class="form-actions">
              <button class="btn btn-primary" type="submit"><i class="fa-solid fa-floppy-disk"></i> Salvar</button>
              <a class="btn btn-secondary" th:href="@{/produtos/listar}">Cancelar</a>
            </div>
          </form>
        </section>
      </main>

      <footer class="site-footer">
        <div class="footer-inner">
          <span>© 2026 Tabajara. Todos os direitos reservados.</span>
          <div class="footer-links">
            <a th:href="@{/home}">Home</a>
            <a th:href="@{/produtos/listar}">Produtos</a>
            <a th:href="@{/fornecedor/listarFornecedores}">Fornecedores</a>
          </div>
        </div>
      </footer>
    </div>
  </body>
</html>
